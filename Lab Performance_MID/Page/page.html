<!DOCTYPE html>
<html lang="en">
    <head> <title> Product Management Page</title></head>
    <body>
        <fieldset>
            <legend>Product Management Page</legend>
            <label for="unitprice">Unit Price:</label><br>
            <input type="number" id="unitprice" name="Unite Price" value="1000" readonly>
            <br><br>

            <input type="number" id="quantity" name="Quantity per Day" placeholder="Enter quantity per day">

            <input type="text" id="totalprice" name="Total Price" placeholder="0">
        </fieldset>
    </body>
</html>
